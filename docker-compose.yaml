version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./database:/app/database
      - ./backups:/app/backups
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=file:/app/database/wdih.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
    restart: unless-stopped
